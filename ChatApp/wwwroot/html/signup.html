<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - UniChat</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Create an account</h1>
        <p>Sign up to get started with UniChat</p>
      </div>

      <form id="signup-form" class="auth-form">
        <div class="profile-upload">
          <div class="profile-picture">
            <div class="profile-picture-placeholder">
              <i data-lucide="user"></i>
            </div>
            <img id="profile-preview" class="hidden">
          </div>
          <div class="profile-picture-overlay">
            <i data-lucide="camera"></i>
          </div>
          <input type="file" id="profile-picture-input" accept="image/*" style="display: none;">
        </div>

        <div class="form-group">
          <label for="fullname">Full Name</label>
          <div class="input-with-icon">
            <i data-lucide="user" class="input-icon"></i>
            <input type="text" id="fullname" required placeholder="John Doe">
          </div>
        </div>

        <div class="form-group">
          <label for="signup-email">Email</label>
          <div class="input-with-icon">
            <i data-lucide="mail" class="input-icon"></i>
            <input type="email" id="signup-email" required placeholder="name@example.com">
          </div>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <div class="phone-input-container">
            <input type="text" id="phone" placeholder="+98 ___ ___ ____">
          </div>
        </div>

        <div class="form-group">
          <label for="signup-password">Password</label>
          <div class="input-with-icon password-input">
            <i data-lucide="lock" class="input-icon"></i>
            <input type="password" id="signup-password" required placeholder="••••••••">
            <button type="button" class="password-toggle">
              <i data-lucide="eye" class="toggle-icon show-password"></i>
              <i data-lucide="eye-off" class="toggle-icon hide-password hidden"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <div class="input-with-icon">
            <i data-lucide="lock" class="input-icon"></i>
            <input type="password" id="confirm-password" required placeholder="••••••••">
          </div>
        </div>

        <div class="form-group checkbox-group">
          <input type="checkbox" id="terms" required>
          <label for="terms">
            I agree to the <a href="#">terms and conditions</a>
          </label>
        </div>

        <button type="submit" class="btn-primary">
          <span>Create account</span>
          <i data-lucide="arrow-right"></i>
        </button>
      </form>

      <div class="auth-footer">
        <p>Already have an account? <a href="login.html">Sign in</a></p>
      </div>
    </div>
  </main>

  <script src="/js/auth.js"></script>
</body>
</html>
